name: CI/CD — Baggage Operations

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository }}/baggage-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository }}/baggage-frontend

jobs:
  # ── Backend lint + test ──────────────────────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Lint (ruff)
        run: pip install ruff && ruff check .
      - name: Type check (mypy)
        run: pip install mypy && mypy . --ignore-missing-imports || true
      - name: Unit tests
        run: pip install pytest pytest-asyncio httpx && pytest tests/ -v || true

  # ── Frontend lint + build ────────────────────────────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint || true
      - name: Build (production)
        run: npm run build
        env:
          VITE_API_URL: https://api.baggage.swedavia.internal
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ── Build and push Docker images ─────────────────────────────────────────────
  docker-build:
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

  # ── Deploy to staging ─────────────────────────────────────────────────────────
  deploy-staging:
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging cluster
        run: |
          kubectl set image deployment/baggage-backend \
            backend=${{ env.IMAGE_BACKEND }}:${{ github.sha }} \
            -n baggage-ops
          kubectl set image deployment/baggage-frontend \
            frontend=${{ env.IMAGE_FRONTEND }}:${{ github.sha }} \
            -n baggage-ops
          kubectl rollout status deployment/baggage-backend -n baggage-ops
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG_STAGING }}
