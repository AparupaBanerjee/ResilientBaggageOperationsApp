version: "3.9"

# Production docker-compose for Swedavia Resilient Baggage Operations
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  couchbase-edge:
    image: couchbase/server-sandbox:7.1.1
    container_name: couchbase-edge
    restart: unless-stopped
    ports:
      - "8091:8091"
      - "8093:8093"
    volumes:
      - couchbase-edge-data:/opt/couchbase/var
    environment:
      - COUCHBASE_ADMINISTRATOR_USERNAME=Administrator
      - COUCHBASE_ADMINISTRATOR_PASSWORD=${CB_PASSWORD:-changeme_prod}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/pools"]
      interval: 30s
      timeout: 10s
      retries: 10
    networks: [baggage-net]

  couchbase-main:
    image: couchbase/server-sandbox:7.1.1
    container_name: couchbase-main
    restart: unless-stopped
    ports:
      - "8092:8091"
      - "8094:8093"
    volumes:
      - couchbase-main-data:/opt/couchbase/var
    environment:
      - COUCHBASE_ADMINISTRATOR_USERNAME=Administrator
      - COUCHBASE_ADMINISTRATOR_PASSWORD=${CB_PASSWORD:-changeme_prod}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/pools"]
      interval: 30s
      timeout: 10s
      retries: 10
    networks: [baggage-net]

  sync-gateway:
    image: couchbase/sync-gateway:3.1.0-community
    container_name: sync-gateway
    restart: unless-stopped
    ports:
      - "4984:4984"
      - "4985:4985"
    volumes:
      - ./sync-gateway-config.json:/etc/sync_gateway/config.json:ro
    depends_on:
      couchbase-edge:
        condition: service_healthy
    networks: [baggage-net]

  baggage-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: baggage-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - EDGE_COUCHBASE_HOST=couchbase-edge
      - MAIN_COUCHBASE_HOST=couchbase-main
      - COUCHBASE_USERNAME=Administrator
      - COUCHBASE_PASSWORD=${CB_PASSWORD:-changeme_prod}
      - COUCHBASE_BUCKET=baggage
    depends_on:
      couchbase-edge:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks: [baggage-net]
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  baggage-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://baggage-backend:8000
    container_name: baggage-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - baggage-backend
    networks: [baggage-net]

  # Optional: Prometheus metrics scraping
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks: [baggage-net]
    profiles: [monitoring]

  # Optional: Grafana dashboards
  grafana:
    image: grafana/grafana:10.1.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    depends_on: [prometheus]
    networks: [baggage-net]
    profiles: [monitoring]

networks:
  baggage-net:
    driver: bridge

volumes:
  couchbase-edge-data:
  couchbase-main-data:
  prometheus-data:
  grafana-data:
